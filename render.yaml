services:
  - type: web
    name: mockcortex-backend
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: node src/index.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: ADDITIONAL_ALLOWED_ORIGINS
        sync: false
      - key: SESSION_SIGNING_SECRET
        sync: false
      - key: SESSION_POW_DIFFICULTY
        sync: false
      - key: BRAIN_SERVICE_URL
        sync: false
      - key: BRAIN_SERVICE_API_KEY
        sync: false
      - key: PORT
        value: 10000
